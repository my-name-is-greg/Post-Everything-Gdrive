<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Google Sans", Roboto, Arial, sans-serif;
    background: #f8f9fa;
    color: #202124;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    height: 64px;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    padding: 0 16px 0 8px;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 8px;
    text-decoration: none;
  }

  .topbar-logo svg { width: 32px; height: 32px; }

  .topbar-logo-text {
    font-size: 18px;
    color: #5f6368;
    font-weight: 400;
    white-space: nowrap;
  }

  .topbar-logo-text strong { color: #202124; font-weight: 500; }

  .topbar-search {
    flex: 1;
    max-width: 720px;
    margin: 0 16px;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: #f1f3f4;
    border-radius: 24px;
    padding: 8px 16px;
    gap: 12px;
    color: #5f6368;
    font-size: 16px;
  }

  .search-box svg { width: 20px; height: 20px; flex-shrink: 0; }

  .search-box span { color: #80868b; font-size: 15px; }

  .topbar-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #1a73e8;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 500;
    margin-left: auto;
    flex-shrink: 0;
  }

  /* ── Layout ── */
  .layout { display: flex; min-height: calc(100vh - 64px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 256px;
    flex-shrink: 0;
    padding: 12px 8px;
    background: #f8f9fa;
  }

  .new-btn {
    display: flex; align-items: center; gap: 12px;
    background: #fff;
    border: none;
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 14px; font-weight: 500;
    color: #202124;
    box-shadow: 0 1px 3px rgba(0,0,0,.2), 0 1px 2px rgba(0,0,0,.1);
    cursor: default;
    margin: 4px 8px 16px;
    width: calc(100% - 16px);
  }

  .new-btn svg { color: #1a73e8; }

  .sidebar-item {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 12px;
    border-radius: 0 16px 16px 0;
    cursor: pointer;
    color: #202124;
    font-size: 14px;
    font-weight: 500;
    margin-right: 8px;
    white-space: nowrap;
  }

  .sidebar-item:hover { background: #e8eaed; }
  .sidebar-item.active { background: #d3e3fd; color: #0842a0; }
  .sidebar-item.active svg { color: #0842a0; }
  .sidebar-item svg { color: #5f6368; width: 20px; height: 20px; flex-shrink: 0; }

  /* ── Main content ── */
  .main { flex: 1; padding: 20px 24px; overflow: auto; }

  /* ── Breadcrumbs ── */
  .breadcrumbs {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 16px;
    font-size: 14px;
    flex-wrap: wrap;
  }

  .crumb {
    color: #5f6368;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .crumb:hover { background: #e8eaed; color: #202124; }
  .crumb.active { color: #202124; font-weight: 500; cursor: default; }
  .crumb.active:hover { background: transparent; }

  .crumb-sep { color: #5f6368; font-size: 18px; user-select: none; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }

  .toolbar-left { display: flex; align-items: center; gap: 4px; }

  .toolbar-title {
    font-size: 16px; font-weight: 500; color: #202124;
    padding: 4px 8px;
  }

  .view-btns {
    display: flex; gap: 2px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    overflow: hidden;
  }

  .view-btn {
    padding: 6px 10px;
    background: #fff;
    border: none;
    cursor: pointer;
    color: #5f6368;
    display: flex; align-items: center;
  }

  .view-btn.active { background: #d3e3fd; color: #0842a0; }
  .view-btn svg { width: 18px; height: 18px; }

  /* ── File list header ── */
  .list-header {
    display: grid;
    grid-template-columns: 1fr 160px 160px;
    padding: 8px 16px;
    color: #5f6368;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border-bottom: 1px solid #e0e0e0;
    margin-bottom: 4px;
  }

  /* ── File rows ── */
  .file-row {
    display: grid;
    grid-template-columns: 1fr 160px 160px;
    align-items: center;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
  }

  .file-row:hover { background: #f1f3f4; }
  .file-row.selected { background: #d3e3fd; }

  .file-name {
    display: flex; align-items: center; gap: 12px;
    min-width: 0;
  }

  .file-name-text {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 14px; color: #202124;
  }

  .file-icon { width: 20px; height: 20px; flex-shrink: 0; }

  .file-meta { font-size: 13px; color: #5f6368; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: #5f6368;
  }

  .empty svg { width: 80px; height: 80px; margin-bottom: 16px; color: #dadce0; }
  .empty p { font-size: 16px; }

  /* ── Grid view ── */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }

  .grid-card {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    background: #fff;
    transition: box-shadow 0.15s;
  }

  .grid-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); border-color: #c6c6c6; }

  .grid-card-preview {
    height: 120px;
    background: #f8f9fa;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid #e0e0e0;
  }

  .grid-card-preview svg { width: 48px; height: 48px; }

  .grid-card-info {
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
  }

  .grid-card-info svg { width: 18px; height: 18px; flex-shrink: 0; }

  .grid-card-name {
    font-size: 13px; color: #202124;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Section labels ── */
  .section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: #5f6368;
    padding: 16px 16px 6px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
</style>

// ── State ────────────────────────────────────────────────────────────────────

let stack = [DRIVE]; // navigation stack
let viewMode = "list"; // "list" | "grid"

// ── Icons ────────────────────────────────────────────────────────────────────

function folderIcon(color="#5f6368", size=20) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${color}"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`;
}

function fileIcon(type, size=20) {
  const configs = {
    doc:   { color: "#4285f4", letter: "D", label: "Docs" },
    sheet: { color: "#0f9d58", letter: "S", label: "Sheets" },
    slides:{ color: "#f4b400", letter: "P", label: "Slides" },
    pdf:   { color: "#ea4335", letter: "P", label: "PDF" },
    image: { color: "#ff6d00", letter: "I", label: "Image" },
    audio: { color: "#9c27b0", letter: "A", label: "Audio" },
    file:  { color: "#5f6368", letter: "F", label: "File" },
  };
  const c = configs[type] || configs.file;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24">
    <rect width="24" height="24" rx="2" fill="${c.color}" opacity="0.12"/>
    <text x="12" y="16" text-anchor="middle" font-size="11" font-weight="700"
      font-family="Google Sans,Roboto,Arial,sans-serif" fill="${c.color}">${c.letter}</text>
  </svg>`;
}

function itemIcon(item, size=20) {
  if (item.type === "folder") return folderIcon("#5f6368", size);
  return fileIcon(item.type, size);
}

function folderColorIcon(item, size=48) {
  if (item.type === "folder") return folderIcon("#fbbc04", size);
  return fileIcon(item.type, size);
}

// ── Navigate ─────────────────────────────────────────────────────────────────

function navigate(item) {
  if (item.type !== "folder") return;
  stack.push(item);
  render();
}

function navigateTo(index) {
  stack = stack.slice(0, index + 1);
  render();
}

// ── Render ───────────────────────────────────────────────────────────────────

function render() {
  const current = stack[stack.length - 1];
  const children = current.children || [];
  const folders = children.filter(c => c.type === "folder");
  const files   = children.filter(c => c.type !== "folder");

  const main = document.getElementById("main");

  // Breadcrumbs
  const crumbs = stack.map((item, i) => {
    const isLast = i === stack.length - 1;
    return `<span class="crumb ${isLast ? "active" : ""}"
      onclick="${isLast ? "" : `navigateTo(${i})`}">${item.name}</span>
      ${isLast ? "" : '<span class="crumb-sep">›</span>'}`;
  }).join("");

  // Toolbar
  const toolbar = `
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="toolbar-title">${current.name}</span>
      </div>
      <div class="view-btns">
        <button class="view-btn ${viewMode==="list"?"active":""}" onclick="setView('list')" title="List view">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
        <button class="view-btn ${viewMode==="grid"?"active":""}" onclick="setView('grid')" title="Grid view">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3zm0 10h8v8H3zm10-10h8v8h-8zm0 10h8v8h-8z"/></svg>
        </button>
      </div>
    </div>`;

  if (viewMode === "list") {
    const header = `<div class="list-header"><span>Name</span><span>Owner</span><span>Modified</span></div>`;

    const folderRows = folders.map(item => `
      <div class="file-row" onclick="navigate(${JSON.stringify(item).replace(/"/g, '&quot;')})">
        <div class="file-name">
          ${itemIcon(item)}
          <span class="file-name-text">${item.name}</span>
        </div>
        <div class="file-meta">me</div>
        <div class="file-meta">—</div>
      </div>`).join("");

    const fileRows = files.map(item => `
      <div class="file-row">
        <div class="file-name">
          ${itemIcon(item)}
          <span class="file-name-text">${item.name}</span>
        </div>
        <div class="file-meta">me</div>
        <div class="file-meta">—</div>
      </div>`).join("");

    const foldersSection = folders.length ? `
      <div class="section-label">Folders</div>${folderRows}` : "";
    const filesSection = files.length ? `
      <div class="section-label" style="margin-top:8px">Files</div>${fileRows}` : "";

    const empty = !children.length ? `
      <div class="empty">
        ${folderIcon("#dadce0", 80)}
        <p>This folder is empty</p>
      </div>` : "";

    main.innerHTML = `
      <div class="breadcrumbs">${crumbs}</div>
      ${toolbar}${header}${foldersSection}${filesSection}${empty}`;

  } else {
    // Grid
    const cards = children.map(item => {
      const onclick = item.type === "folder"
        ? `onclick="navigate(${JSON.stringify(item).replace(/"/g, '&quot;')})"` : "";
      return `
        <div class="grid-card" ${onclick}>
          <div class="grid-card-preview">${folderColorIcon(item, 48)}</div>
          <div class="grid-card-info">
            ${itemIcon(item, 18)}
            <span class="grid-card-name">${item.name}</span>
          </div>
        </div>`;
    }).join("");

    const empty = !children.length ? `
      <div class="empty">
        ${folderIcon("#dadce0", 80)}
        <p>This folder is empty</p>
      </div>` : "";

    main.innerHTML = `
      <div class="breadcrumbs">${crumbs}</div>
      ${toolbar}
      <div class="grid-view">${cards}</div>
      ${empty}`;
  }

  // Re-attach navigate for list view (can't use inline JSON with nested quotes cleanly)
  // Use data attributes instead for folder rows
  document.querySelectorAll(".file-row[onclick]").forEach(row => {
    const raw = row.getAttribute("onclick");
    row.removeAttribute("onclick");
    row.addEventListener("click", () => {
      // find matching child by name
      const nameEl = row.querySelector(".file-name-text");
      if (!nameEl) return;
      const name = nameEl.textContent;
      const item = children.find(c => c.name === name);
      if (item && item.type === "folder") navigate(item);
    });
  });

  document.querySelectorAll(".grid-card[onclick]").forEach(card => {
    card.removeAttribute("onclick");
    card.addEventListener("click", () => {
      const nameEl = card.querySelector(".grid-card-name");
      if (!nameEl) return;
      const name = nameEl.textContent;
      const item = children.find(c => c.name === name);
      if (item && item.type === "folder") navigate(item);
    });
  });
}

function setView(mode) {
  viewMode = mode;
  render();
}

// Initial render
render();
</script>
